name: Weekly README.md update
on:
  schedule:
    - cron: '15 4 * * 1'
  workflow_dispatch: # Allows you to run it manually from the Actions tab
jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ vars.GEMINI_API_KEY }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true # Speeds up subsequent runs even more
          # The version of Python to set UV_PYTHON to
          python-version: "3.14.3"
          
      - name: Debug Secret
        run: echo "Key length is ${#GEMINI_API_KEY}"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Run Scraper with uv
        # 'uv run' will automatically handle dependencies if defined in the script
        env:
          # Mapping the secret to the environment variable
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run generate_readme.py
      
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add README.md
          git commit -m "docs: weekly stack refresh ($GITHUB_RUN_ID)" || echo "No changes found"
          git push
